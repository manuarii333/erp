<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>HCS Workflow Builder — Processus & Agents IA</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --esp:#08061a;--bd:#100e28;--bm:#181535;
  --car:#7c3aed;--carl:#a78bfa;--cr:#f0ecff;--crd:#b8aee8;
  --amb:#8b5cf6;--sur:#060414;
  --bor:rgba(124,58,237,.25);--borl:rgba(124,58,237,.1);
  --mut:#6052a0;--r:10px;--rs:7px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Inter',sans-serif;background:var(--esp);color:var(--cr);font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--bor);border-radius:2px}

.app{display:grid;grid-template-rows:52px 1fr;grid-template-columns:282px 1fr;height:100vh;overflow:hidden}

/* Topbar */
.topbar{grid-column:1/-1;display:flex;align-items:center;gap:12px;padding:0 20px;background:var(--bd);border-bottom:1px solid var(--bor)}
.topbar-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:var(--carl)}
.topbar-title span{color:var(--crd);font-weight:600}
.topbar-right{margin-left:auto;display:flex;gap:7px;align-items:center}

/* Sidebar */
.sidebar{background:var(--bd);border-right:1px solid var(--bor);display:flex;flex-direction:column;overflow:hidden}
.sb-top{padding:10px;border-bottom:1px solid var(--borl)}
.sb-search{width:100%;background:var(--bm);border:1px solid var(--bor);border-radius:var(--rs);color:var(--cr);font-family:'Inter',sans-serif;font-size:12px;padding:6px 10px;outline:none;margin-bottom:8px}
.sb-search:focus{border-color:var(--car)}
.sb-search::placeholder{color:var(--mut)}
.sb-filters{display:flex;gap:4px;flex-wrap:wrap}
.sf{padding:3px 7px;border-radius:4px;font-size:10px;cursor:pointer;border:1px solid var(--bor);background:transparent;color:var(--mut);font-family:'Inter',sans-serif;transition:all .1s}
.sf:hover,.sf.on{background:rgba(196,129,58,.13);border-color:var(--car);color:var(--carl)}
.sb-list{flex:1;overflow-y:auto;padding:6px}
.wf-item{padding:9px 10px;border-radius:var(--rs);cursor:pointer;border:1px solid transparent;margin-bottom:3px;transition:all .1s;position:relative}
.wf-item:hover{background:var(--bm)}
.wf-item.active{background:var(--bm);border-color:var(--bor)}
.wf-nom{font-size:12px;font-weight:600;color:var(--cr);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wf-meta{display:flex;align-items:center;gap:6px}
.cat-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.wf-steps-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--mut)}
.wf-empty{padding:28px 16px;text-align:center;color:var(--mut);font-size:12px}

/* Main */
.main{overflow-y:auto;display:flex;flex-direction:column;background:var(--esp)}
.main-empty{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;color:var(--mut)}
.main-empty .ico{font-size:52px;opacity:.25}
.main-empty p{font-size:13px}

/* Workflow header */
.wf-header{background:var(--bd);border-bottom:1px solid var(--bor);padding:18px 24px 14px;flex-shrink:0}
.wf-hdr-top{display:flex;align-items:flex-start;gap:14px;margin-bottom:10px}
.wf-hdr-info{flex:1;min-width:0}
.wf-nom-big{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--cr);margin-bottom:3px}
.wf-desc-txt{font-size:12px;color:var(--crd)}
.wf-badges{display:flex;gap:7px;flex-wrap:wrap}
.bdg{font-family:'DM Mono',monospace;font-size:10px;padding:2px 7px;border-radius:4px;border:1px solid}

/* Steps area */
.steps-area{padding:24px;flex:1}
.steps-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.steps-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--car);letter-spacing:.8px;text-transform:uppercase}
.steps-list{display:flex;flex-direction:column;gap:0}

/* Step card */
.step-wrap{display:flex;gap:14px;padding-bottom:8px;position:relative}
.step-wrap:not(:last-child)::after{content:'';position:absolute;left:19px;top:42px;bottom:0;width:2px;background:var(--bor)}
.step-num{width:38px;height:38px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:12px;flex-shrink:0;background:var(--esp);z-index:1;margin-top:0}
.step-body{flex:1;min-width:0}
.step-card{background:var(--bd);border:1px solid var(--bor);border-radius:var(--r);overflow:hidden;transition:border-color .12s}
.step-card:hover{border-color:rgba(196,129,58,.4)}
.step-card.open{border-color:rgba(196,129,58,.55)}
.step-card-head{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer}
.step-ag-ico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.step-info{flex:1;min-width:0}
.step-action{font-size:13px;font-weight:600;color:var(--cr);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.step-ag-name{font-size:10px;color:var(--mut)}
.step-ctrl{display:flex;gap:3px;flex-shrink:0}
.sbtn{width:24px;height:24px;border-radius:5px;background:rgba(255,255,255,.04);border:1px solid var(--bor);color:var(--mut);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .1s}
.sbtn:hover:not(:disabled){background:rgba(124,58,237,.15);border-color:var(--car);color:var(--carl)}
.sbtn:disabled{opacity:.25;cursor:default}
.sbtn.del:hover{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:#fca5a5}

/* Step form */
.step-form{display:none;flex-direction:column;gap:10px;padding:14px;border-top:1px solid var(--borl);background:rgba(0,0,0,.12)}
.step-card.open .step-form{display:flex}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg{display:flex;flex-direction:column;gap:4px}
.fl{font-size:10px;font-weight:600;color:var(--crd);text-transform:uppercase;letter-spacing:.4px}
.fi,.fsel,.fta{background:var(--bm);border:1px solid var(--bor);border-radius:var(--rs);color:var(--cr);font-family:'Inter',sans-serif;font-size:12px;padding:7px 10px;outline:none;width:100%;transition:border-color .1s}
.fi:focus,.fsel:focus,.fta:focus{border-color:var(--car)}
.fsel option{background:var(--bm)}
.fta{resize:vertical;min-height:58px}

/* Add step btn */
.add-step-btn{display:flex;align-items:center;gap:8px;padding:11px 14px;border-radius:var(--r);border:1px dashed var(--bor);background:transparent;color:var(--mut);cursor:pointer;font-family:'Inter',sans-serif;font-size:12px;width:calc(100% - 52px);margin-left:52px;margin-top:8px;transition:all .12s}
.add-step-btn:hover{border-color:var(--car);color:var(--carl);background:rgba(124,58,237,.08)}

/* Buttons */
.btn{padding:6px 13px;border-radius:var(--rs);font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .12s;white-space:nowrap}
.btn-p{background:var(--car);color:#f0ecff}
.btn-p:hover{background:var(--carl)}
.btn-s{background:rgba(255,255,255,.06);color:var(--crd);border:1px solid var(--bor)}
.btn-s:hover{background:rgba(255,255,255,.1)}
.btn-danger{background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.2)}
.btn-danger:hover{background:rgba(239,68,68,.18)}
.btn-sm{padding:4px 9px;font-size:11px}

/* Type badges */
.t-auto{background:rgba(34,197,94,.1);color:#86efac;border-color:rgba(34,197,94,.25)}
.t-humain{background:rgba(96,165,250,.1);color:#93c5fd;border-color:rgba(96,165,250,.25)}
.t-hybride{background:rgba(167,139,250,.1);color:#c4b5fd;border-color:rgba(167,139,250,.25)}
.s-draft{background:rgba(120,120,120,.1);color:#aaa;border-color:rgba(120,120,120,.2)}
.s-actif{background:rgba(34,197,94,.1);color:#86efac;border-color:rgba(34,197,94,.25)}
.s-archive{background:rgba(239,68,68,.08);color:#fca5a5;border-color:rgba(239,68,68,.2)}

/* Images d'illustration */
.step-imgs-grid{display:flex;flex-wrap:wrap;gap:7px;align-items:flex-start;margin-top:2px}
.img-thumb{position:relative;width:88px;height:66px;border-radius:6px;overflow:hidden;border:1px solid var(--bor);flex-shrink:0}
.img-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .15s;cursor:zoom-in}
.img-thumb:hover img{opacity:.8}
.img-del{position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:3px;background:rgba(0,0,0,.72);border:none;color:#fca5a5;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .12s;padding:0;line-height:1}
.img-thumb:hover .img-del{opacity:1}
.img-add{width:88px;height:66px;border-radius:6px;border:1.5px dashed var(--bor);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .12s;color:var(--mut);flex-shrink:0;gap:3px}
.img-add:hover,.img-add.drag{border-color:var(--car);color:var(--carl);background:rgba(124,58,237,.08)}
.img-add .ia-ico{font-size:16px}
.img-add .ia-lbl{font-size:9px;font-family:'Inter',sans-serif;text-align:center;line-height:1.2}

/* Lightbox */
.lb{position:fixed;inset:0;background:rgba(6,4,20,.92);display:none;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(6px)}
.lb.open{display:flex}
.lb-img-wrap{position:relative;max-width:92vw;max-height:90vh}
.lb-img-wrap img{max-width:92vw;max-height:86vh;border-radius:8px;display:block;object-fit:contain;box-shadow:0 8px 48px rgba(0,0,0,.6)}
.lb-cls{position:absolute;top:-38px;right:0;width:30px;height:30px;border-radius:6px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.lb-cls:hover{background:rgba(255,255,255,.22)}
.lb-counter{position:absolute;bottom:-26px;left:50%;transform:translateX(-50%);font-family:'DM Mono',monospace;font-size:11px;color:rgba(255,255,255,.45);white-space:nowrap}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:#fff;cursor:pointer;font-size:20px;display:none;align-items:center;justify-content:center;transition:background .1s}
.lb-nav:hover{background:rgba(255,255,255,.22)}
.lb-prev{right:calc(100% + 14px)}
.lb-next{left:calc(100% + 14px)}

/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(3px)}
.mo.open{display:flex}
.modal{background:var(--bd);border:1px solid var(--bor);border-radius:var(--r);width:480px;max-width:95vw}
.m-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--bor)}
.m-tit{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--cr)}
.m-cls{width:24px;height:24px;border-radius:5px;background:rgba(255,255,255,.06);border:none;color:var(--crd);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.m-cls:hover{background:rgba(255,255,255,.12)}
.m-body{padding:18px;display:flex;flex-direction:column;gap:11px}
.m-ftr{padding:12px 18px;border-top:1px solid var(--bor);display:flex;justify-content:flex-end;gap:7px}
</style>
</head>
<body>
<div class="app">

<header class="topbar">
  <div class="topbar-title">⛓ HCS Workflow Builder <span>— Processus & Agents IA</span></div>
  <div class="topbar-right">
    <button class="btn btn-s btn-sm" onclick="exportAll()">⬇ Export JSON</button>
    <button class="btn btn-p btn-sm" onclick="openNewWf()">+ Nouveau workflow</button>
  </div>
</header>

<aside class="sidebar">
  <div class="sb-top">
    <input class="sb-search" id="sb-inp" placeholder="Rechercher un processus…" oninput="filterWf(this.value)">
    <div class="sb-filters" id="sb-filters"></div>
  </div>
  <div class="sb-list" id="sb-list"></div>
</aside>

<main class="main" id="main">
  <div class="main-empty">
    <div class="ico">⛓</div>
    <p>Sélectionne un processus ou crée-en un nouveau</p>
    <button class="btn btn-p" onclick="openNewWf()">+ Nouveau workflow</button>
  </div>
</main>

</div>

<!-- Lightbox -->
<div class="lb" id="lightbox" onclick="if(event.target===this)closeLightbox()">
  <div class="lb-img-wrap">
    <button class="lb-cls" onclick="closeLightbox()">✕</button>
    <button class="lb-nav lb-prev" id="lb-prev" onclick="lbNav(-1)">‹</button>
    <img id="lb-img" src="" alt="Illustration étape">
    <button class="lb-nav lb-next" id="lb-next" onclick="lbNav(1)">›</button>
    <div class="lb-counter" id="lb-counter"></div>
  </div>
</div>

<!-- Modal nouveau / modifier workflow -->
<div class="mo" id="mo" onclick="moOut(event)">
  <div class="modal">
    <div class="m-hdr">
      <span class="m-tit" id="m-lbl">📋 Nouveau workflow</span>
      <button class="m-cls" onclick="closeMo()">✕</button>
    </div>
    <div class="m-body">
      <div class="fg"><label class="fl">Nom du processus</label><input class="fi" id="m-nom" placeholder="ex: Traitement devis client…"></div>
      <div class="fg"><label class="fl">Description</label><textarea class="fta" id="m-desc" placeholder="Ce que ce processus accomplit…" style="min-height:52px"></textarea></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="fg"><label class="fl">Catégorie</label>
          <select class="fsel" id="m-cat">
            <option value="commercial">🤝 Commercial</option>
            <option value="production">⚙️ Production</option>
            <option value="logistique">📦 Logistique</option>
            <option value="finance">💰 Finance</option>
            <option value="marketing">📢 Marketing</option>
            <option value="support">🎧 Support SAV</option>
            <option value="catalogue">🗂️ Catalogue</option>
            <option value="admin">⬡ Administration</option>
          </select>
        </div>
        <div class="fg"><label class="fl">Statut</label>
          <select class="fsel" id="m-statut">
            <option value="draft">📝 Brouillon</option>
            <option value="actif">✅ Actif</option>
            <option value="archive">🗄️ Archivé</option>
          </select>
        </div>
      </div>
      <div class="fg"><label class="fl">Déclencheur du processus</label><input class="fi" id="m-trig" placeholder="ex: Réception message Gmail avec demande de devis…"></div>
    </div>
    <div class="m-ftr">
      <button class="btn btn-s" onclick="closeMo()">Annuler</button>
      <button class="btn btn-p" id="m-save" onclick="saveWf()">Créer</button>
    </div>
  </div>
</div>

<script>
'use strict';
const SK = 'hcs_workflows_v1';

const AGENTS = [
  {id:'agent_hcs_triage_1',              nom:'Agent 1 — Triage',      icon:'📨',color:'#10B981'},
  {id:'agent_011Ca1i5Lk4BaMSRTMCtdkjk', nom:'HCS-Commercial',         icon:'🤝',color:'#4A5FFF'},
  {id:'agent_hcs_picwish_3',             nom:'Agent 3 — PicWish',      icon:'🖼️',color:'#06B6D4'},
  {id:'agent_011Ca1i2FzUX3zNd4xuM4PHa', nom:'HCS-Atelier',            icon:'⚙️',color:'#FF6B6B'},
  {id:'agent_hcs_planning_5',            nom:'Agent 5 — Planning',     icon:'📅',color:'#8B5CF6'},
  {id:'agent_011Ca1i5a41GExc8u42YVC4y', nom:'HCS-Logistique',          icon:'📦',color:'#6B7280'},
  {id:'agent_011Ca1i5WyDUg2fQCJSUzWq5', nom:'HCS-Finance',            icon:'💰',color:'#F59E0B'},
  {id:'agent_011Ca1i5QZW9BuYFmAEUbrt3', nom:'HCS-Marketing',          icon:'📢',color:'#B07BFF'},
  {id:'agent_011Ca1i5cqgmXC8pfK6n8YvJ', nom:'HCS-Music',              icon:'🎵',color:'#EC4899'},
  {id:'agent_011Ca1i5TrwZCPHXnqW8EjqM', nom:'HCS-Support',            icon:'🎧',color:'#00D4AA'},
  {id:'agent_011Ca1i5g4QWANXkWTS8FCDT', nom:'HCS-Orchestrateur',      icon:'⬡',color:'#4A5FFF'},
  {id:'agent_hcs_catalogue_12',          nom:'HCS-Catalogue',          icon:'🗂️',color:'#F97316'},
  {id:'agent_hcs_logo_13',              nom:'HCS-Logo',               icon:'✦',color:'#A855F7'},
  {id:'humain',                          nom:'Équipe HCS (humain)',     icon:'👤',color:'#94A3B8'},
];

const CATS = {
  commercial:'#4A5FFF', production:'#FF6B6B', logistique:'#6B7280',
  finance:'#F59E0B', marketing:'#B07BFF', support:'#00D4AA',
  catalogue:'#F97316', admin:'#94A3B8'
};
const CICO = {
  commercial:'🤝', production:'⚙️', logistique:'📦',
  finance:'💰', marketing:'📢', support:'🎧',
  catalogue:'🗂️', admin:'⬡'
};

function h2r(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return `${r},${g},${b}`}
function uid(){return 'id_'+Date.now()+'_'+Math.random().toString(36).slice(2,6)}
function ag(id){return AGENTS.find(a=>a.id===id)||{nom:'—',icon:'❓',color:'#888'}}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function today(){return new Date().toISOString().split('T')[0]}

let WFS = [];
function load(){WFS = JSON.parse(localStorage.getItem(SK)||'[]')}
function save(){localStorage.setItem(SK,JSON.stringify(WFS))}

let curId = null;
let openStepId = null;
let _editId = null;
let filterQ = '';
let filterCat = '';

function getCur(){return WFS.find(w=>w.id===curId)||null}

/* ── Sidebar ── */
function rdrSidebar(){
  const filtersEl = document.getElementById('sb-filters');
  const allCats = [...new Set(WFS.map(w=>w.categorie))].filter(Boolean);
  filtersEl.innerHTML = allCats.map(k=>
    `<button class="sf${filterCat===k?' on':''}" onclick="setCat('${k}')">${CICO[k]||'⛓'} ${k}</button>`
  ).join('') + (allCats.length>1?`<button class="sf${filterCat===''?' on':''}" onclick="setCat('')">Tous</button>`:'');

  const list = document.getElementById('sb-list');
  const items = WFS.filter(w=>{
    if(filterCat && w.categorie!==filterCat) return false;
    if(filterQ && !w.nom.toLowerCase().includes(filterQ.toLowerCase())) return false;
    return true;
  });
  if(!items.length){
    list.innerHTML=`<div class="wf-empty">Aucun workflow${filterCat?' dans cette catégorie':''}<br><br><button class="btn btn-p btn-sm" onclick="openNewWf()">+ Créer</button></div>`;
    return;
  }
  list.innerHTML = items.map(w=>`
    <div class="wf-item${w.id===curId?' active':''}" onclick="selWf('${w.id}')">
      <div class="wf-nom">${CICO[w.categorie]||'⛓'} ${esc(w.nom)}</div>
      <div class="wf-meta">
        <div class="cat-dot" style="background:${CATS[w.categorie]||'#888'}"></div>
        <span class="wf-steps-count">${w.etapes.length} étape${w.etapes.length!==1?'s':''}</span>
        <span style="font-family:'DM Mono',monospace;font-size:9px;padding:1px 5px;border-radius:3px;margin-left:auto" class="s-${w.statut}">${w.statut}</span>
      </div>
    </div>`).join('');
}

/* ── Main ── */
function rdrMain(){
  const w = getCur();
  const el = document.getElementById('main');
  if(!w){
    el.innerHTML=`<div class="main-empty"><div class="ico">⛓</div><p>Sélectionne un processus ou crée-en un nouveau</p><button class="btn btn-p" onclick="openNewWf()">+ Nouveau workflow</button></div>`;
    return;
  }
  const rgb = h2r(CATS[w.categorie]||'#888');
  const statL = {draft:'📝 Brouillon',actif:'✅ Actif',archive:'🗄️ Archivé'};
  el.innerHTML = `
    <div class="wf-header">
      <div class="wf-hdr-top">
        <div class="wf-hdr-info">
          <div class="wf-nom-big">${CICO[w.categorie]||'⛓'} ${esc(w.nom)}</div>
          ${w.desc?`<div class="wf-desc-txt">${esc(w.desc)}</div>`:''}
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0;align-items:flex-start">
          <button class="btn btn-s btn-sm" onclick="openEditWf()">✏️ Modifier</button>
          <button class="btn btn-s btn-sm" onclick="exportWf()">⬇ Export</button>
          <button class="btn btn-danger btn-sm" onclick="deleteWf()">🗑</button>
        </div>
      </div>
      <div class="wf-badges">

function stepCard(s,i,w){
  const a = ag(s.agent);
  const isOpen = openStepId===s.id;
  const rgb = h2r(a.color||'#888');
  const tClass = {automatique:'t-auto',humain:'t-humain',hybride:'t-hybride'}[s.type]||'t-auto';
  const tLabel = {automatique:'🤖 Auto',humain:'👤 Humain',hybride:'🔀 Hybride'}[s.type]||s.type;
  return `
    <div class="step-wrap">
      <div class="step-num" style="border-color:rgba(${rgb},.4);color:${a.color}">${i+1}</div>
      <div class="step-body">
        <div class="step-card${isOpen?' open':''}" id="sc-${s.id}">
          <div class="step-card-head" onclick="toggleStep('${s.id}')">
            <div class="step-ag-ico" style="background:rgba(${rgb},.14)">${a.icon}</div>
            <div class="step-info">
              <div class="step-action">${esc(s.action)||'<span style="color:var(--mut)">Action à définir…</span>'}</div>
              <div class="step-ag-name">${a.nom}</div>
            </div>
            <span class="bdg ${tClass}" style="font-size:9px;padding:1px 6px;flex-shrink:0">${tLabel}</span>
            <div class="step-ctrl" onclick="event.stopPropagation()">
              <button class="sbtn" onclick="moveStep('${s.id}',-1)" ${i===0?'disabled':''}>↑</button>
              <button class="sbtn" onclick="moveStep('${s.id}',1)" ${i===w.etapes.length-1?'disabled':''}>↓</button>

/* ── Actions ── */
function selWf(id){curId=id;openStepId=null;rdrSidebar();rdrMain()}
function toggleStep(id){
  openStepId = openStepId===id ? null : id;
  rdrMain();
  if(openStepId) setTimeout(()=>{const el=document.getElementById('sc-'+id);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'})},80);
}
function setCat(c){filterCat=c;rdrSidebar()}
function filterWf(v){filterQ=v;rdrSidebar()}

function upd(stepId, field, val){
  const w=getCur();if(!w)return;
  const s=w.etapes.find(e=>e.id===stepId);if(!s)return;
  s[field]=val;
  w.updated=today();
  save();
  if(['agent','type'].includes(field)){rdrMain();openStepId=stepId;}
}

function addStep(){
  const w=getCur();if(!w)return;
  const s={id:uid(),agent:AGENTS[0].id,action:'',description:'',images:[],input:'',output:'',outils:[],duree:'',type:'automatique',condition:'',created:today()};
  w.etapes.push(s);
  w.updated=today();
  save();
  openStepId=s.id;
  rdrMain();
  setTimeout(()=>{const el=document.getElementById('sc-'+s.id);if(el)el.scrollIntoView({behavior:'smooth',block:'center'})},100);
}

function deleteStep(id){
  const w=getCur();if(!w)return;
  if(!confirm('Supprimer cette étape ?'))return;
  w.etapes=w.etapes.filter(e=>e.id!==id);
  if(openStepId===id)openStepId=null;
  w.updated=today();
  save();rdrMain();
}

function moveStep(id,dir){
  const w=getCur();if(!w)return;
  const i=w.etapes.findIndex(e=>e.id===id);
  const ni=i+dir;
  if(ni<0||ni>=w.etapes.length)return;
  [w.etapes[i],w.etapes[ni]]=[w.etapes[ni],w.etapes[i]];
  w.updated=today();
  save();rdrMain();
}

/* ── Images ── */
function renderImgs(s){
  const imgs = s.images || [];
  const thumbs = imgs.map((src,i)=>`
    <div class="img-thumb">
      <img src="${src}" onclick="openLightbox('${s.id}',${i})" title="Voir en grand">
      <button class="img-del" onclick="event.stopPropagation();deleteImg('${s.id}',${i})" title="Supprimer">✕</button>
    </div>`).join('');
  const addBtn = `<label class="img-add"
    ondragover="event.preventDefault();this.classList.add('drag')"
    ondragleave="this.classList.remove('drag')"
    ondrop="event.preventDefault();this.classList.remove('drag');uploadImgFiles('${s.id}',event.dataTransfer.files)"
    title="Ajouter une capture (ou glisser-déposer)">
    <div class="ia-ico">📷</div>
    <div class="ia-lbl">Ajouter<br>image</div>
    <input type="file" accept="image/*" multiple style="display:none" onchange="uploadImg('${s.id}',this)">
  </label>`;
  return thumbs + addBtn;
}

function resizeImg(file, maxW=900, maxH=700, q=0.76){
  return new Promise(resolve=>{
    const img=new Image(), url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      let w=img.width, h=img.height;
      if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
      if(h>maxH){w=Math.round(w*maxH/h);h=maxH;}
      const c=document.createElement('canvas');
      c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      resolve(c.toDataURL('image/jpeg',q));
    };
    img.onerror=()=>{URL.revokeObjectURL(url);resolve(null);};
    img.src=url;
  });
}

async function uploadImgFiles(stepId, files){
  const w=getCur();if(!w)return;
  const s=w.etapes.find(e=>e.id===stepId);if(!s)return;
  if(!s.images)s.images=[];
  let added=0;
  for(const file of Array.from(files)){
    if(!file.type.startsWith('image/'))continue;
    if(file.size>8*1024*1024){alert(`"${file.name}" dépasse 8 Mo — redimensionne-la d'abord.`);continue;}
    const b64=await resizeImg(file);
    if(b64){s.images.push(b64);added++;}
  }
  if(!added)return;
  w.updated=today();
  save();
  const el=document.getElementById('imgs-'+stepId);
  if(el)el.innerHTML=renderImgs(s);
}

async function uploadImg(stepId, input){
  await uploadImgFiles(stepId, input.files);
  input.value='';
}

function deleteImg(stepId,idx){
  if(!confirm('Supprimer cette image ?'))return;
  const w=getCur();if(!w)return;
  const s=w.etapes.find(e=>e.id===stepId);if(!s)return;
  (s.images||[]).splice(idx,1);
  w.updated=today();save();
  const el=document.getElementById('imgs-'+stepId);
  if(el)el.innerHTML=renderImgs(s);
}

/* ── Lightbox ── */
let lbStep=null, lbIdx=0;
function openLightbox(stepId,idx){
  lbStep=stepId;lbIdx=idx;showLb();
}
function showLb(){
  const w=getCur();if(!w)return;
  const s=w.etapes.find(e=>e.id===lbStep);if(!s)return;
  const imgs=s.images||[];if(!imgs.length)return;
  lbIdx=Math.max(0,Math.min(lbIdx,imgs.length-1));
  document.getElementById('lb-img').src=imgs[lbIdx];
  document.getElementById('lb-counter').textContent=imgs.length>1?`${lbIdx+1} / ${imgs.length}`:'';
  const prev=document.getElementById('lb-prev');
  const next=document.getElementById('lb-next');
  prev.style.display=lbIdx>0?'flex':'none';
  next.style.display=lbIdx<imgs.length-1?'flex':'none';
  document.getElementById('lightbox').classList.add('open');
}
function lbNav(dir){lbIdx+=dir;showLb();}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}

document.addEventListener('keydown',e=>{
  const lbOpen=document.getElementById('lightbox').classList.contains('open');
  if(e.key==='Escape'){closeMo();closeLightbox();}
  if(lbOpen&&e.key==='ArrowLeft')lbNav(-1);
  if(lbOpen&&e.key==='ArrowRight')lbNav(1);
  if(e.key==='Enter'&&document.activeElement.id==='m-nom')saveWf();
});
