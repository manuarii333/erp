<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profils Agents IA — HCS ERP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --esp:#0a0f1e; --bd:#0d1530; --bm:#0f1e3d;
  --car:#00d4ff; --carl:#4de8ff; --cr:#e2f0ff; --crd:#a8c4e8;
  --amb:#00d4ff; --sur:#080d1a;
  --bor:rgba(0,212,255,.2); --borl:rgba(0,212,255,.08);
  --mut:#4a6080; --r:12px; --rs:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Inter',sans-serif;background:var(--esp);color:var(--cr);font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--bor);border-radius:2px}

.app{display:grid;grid-template-rows:54px 1fr;grid-template-columns:272px 1fr;height:100vh;overflow:hidden}

/* Topbar */
.topbar{grid-column:1/-1;display:flex;align-items:center;gap:14px;padding:0 22px;background:var(--bd);border-bottom:1px solid var(--bor)}
.topbar-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--carl);letter-spacing:.4px}
.topbar-title span{color:var(--crd);font-weight:600}
.topbar-right{margin-left:auto;display:flex;gap:10px;align-items:center}
.topbar-date{font-family:'DM Mono',monospace;font-size:11px;color:var(--mut)}

/* Sidebar */
.sidebar{background:var(--bd);border-right:1px solid var(--bor);display:flex;flex-direction:column;overflow:hidden}
.sb-search{padding:10px 12px;border-bottom:1px solid var(--borl)}
.sb-search input{width:100%;background:var(--bm);border:1px solid var(--bor);border-radius:var(--rs);color:var(--cr);font-family:'Inter',sans-serif;font-size:13px;padding:7px 11px;outline:none}
.sb-search input::placeholder{color:var(--mut)}
.sb-search input:focus{border-color:var(--car)}
.sb-list{flex:1;overflow-y:auto;padding:6px 8px;display:flex;flex-direction:column;gap:3px}
.ag-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--rs);cursor:pointer;border:1px solid transparent;transition:all .12s;position:relative}
.ag-item:hover{background:var(--bm)}
.ag-item.active{background:var(--bm);border-color:var(--bor)}
.ag-item::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:3px;border-radius:0 2px 2px 0;background:var(--ac,var(--car));opacity:0;transition:opacity .12s}
.ag-item.active::before,.ag-item:hover::before{opacity:1}
.ag-ico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.ag-info{flex:1;min-width:0}
.ag-nom{font-size:12px;font-weight:600;color:var(--cr);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ag-role-s{font-size:10px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ag-bdg{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.bm{font-family:'DM Mono',monospace;font-size:9px;padding:2px 5px;border-radius:3px;text-transform:uppercase;letter-spacing:.4px}
.bm.opus{background:rgba(99,102,241,.2);color:#a5b4fc}
.bm.sonnet{background:rgba(196,129,58,.2);color:var(--carl)}
.bm.haiku{background:rgba(16,185,129,.2);color:#6ee7b7}
.bev{font-family:'DM Mono',monospace;font-size:9px;color:var(--mut)}

/* Main */
.main{overflow-y:auto;display:flex;flex-direction:column}

/* Profile header */
.ph{background:var(--bd);border-bottom:1px solid var(--bor);padding:20px 28px 16px;display:flex;align-items:flex-start;gap:18px}
.ph-ico{width:60px;height:60px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;border:2px solid}
.ph-meta{flex:1}
.ph-nom{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--cr);margin-bottom:2px}
.ph-role{font-size:12px;color:var(--crd);margin-bottom:8px}
.ph-tags{display:flex;gap:7px;flex-wrap:wrap}
.tag{font-family:'DM Mono',monospace;font-size:10px;padding:2px 7px;border-radius:4px;background:rgba(255,255,255,.06);color:var(--crd);border:1px solid var(--borl)}
.tag.opus{background:rgba(99,102,241,.15);color:#a5b4fc;border-color:rgba(99,102,241,.3)}
.tag.sonnet{background:rgba(0,212,255,.12);color:var(--carl);border-color:rgba(0,212,255,.3)}
.tag.actif{background:rgba(16,185,129,.12);color:#6ee7b7;border-color:rgba(16,185,129,.3)}
.tag.n8n{background:rgba(251,113,133,.12);color:#fda4af;border-color:rgba(251,113,133,.25)}
.tag.erp{background:rgba(249,115,22,.12);color:#fdba74;border-color:rgba(249,115,22,.25)}
.tag.managed{background:rgba(139,92,246,.12);color:#c4b5fd;border-color:rgba(139,92,246,.25)}

/* Stats */
.stats{display:flex;border-bottom:1px solid var(--bor);background:var(--sur)}
.st{flex:1;padding:10px 14px;border-right:1px solid var(--borl)}
.st:last-child{border-right:none}
.stv{font-family:'DM Mono',monospace;font-size:18px;font-weight:500;color:var(--cr)}
.stl{font-size:10px;color:var(--mut);line-height:1.3}

/* Tabs */
.tabs{display:flex;background:var(--sur);border-bottom:1px solid var(--bor);padding:0 20px}
.tb{padding:10px 14px;font-size:12px;font-weight:500;color:var(--mut);cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;transition:all .12s;white-space:nowrap}
.tb:hover{color:var(--crd)}
.tb.active{color:var(--carl);border-bottom-color:var(--car)}
.tbc{display:none;padding:24px 28px;flex-direction:column;gap:20px}
.tbc.active{display:flex}

/* Sections */
.sec-t{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--car);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.desc-box{background:var(--bm);border:1px solid var(--bor);border-radius:var(--r);padding:14px 16px;font-size:13px;color:var(--crd);line-height:1.7}
.cap-list{display:flex;flex-direction:column;gap:7px}
.cap-item{display:flex;align-items:flex-start;gap:9px;padding:9px 12px;background:var(--bm);border-radius:var(--rs);border:1px solid var(--borl);font-size:13px;color:var(--cr)}
.cap-dot{width:5px;height:5px;border-radius:50%;margin-top:6px;flex-shrink:0}

/* Tools table */
.tt{width:100%;border-collapse:collapse}
.tt th{text-align:left;padding:7px 10px;font-size:10px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--bor)}
.tt td{padding:9px 10px;border-bottom:1px solid var(--borl);font-size:12px;vertical-align:top}
.tt tr:last-child td{border-bottom:none}
.tn{font-family:'DM Mono',monospace;font-size:11px;color:var(--carl);white-space:nowrap}
.td{color:var(--crd)}
.app-list,.int-list{display:flex;flex-direction:column;gap:5px}
.app-item,.int-item{display:flex;align-items:flex-start;gap:9px;padding:9px 12px;background:var(--bm);border-radius:var(--rs);border:1px solid var(--borl);font-size:12px}
.int-ag{font-family:'DM Mono',monospace;font-size:10px;color:var(--amb);white-space:nowrap;margin-top:1px}
.int-d{color:var(--crd)}

/* Chains */
.chains{display:flex;flex-direction:column;gap:18px}
.ch-card{background:var(--bm);border:1px solid var(--bor);border-radius:var(--r);overflow:hidden}
.ch-head{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--borl);background:rgba(0,0,0,.15)}
.ch-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--cr);flex:1}
.bfreq{font-family:'DM Mono',monospace;font-size:9px;padding:3px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.bfreq.quotidien{background:rgba(16,185,129,.15);color:#6ee7b7}
.bfreq.hebdo{background:rgba(99,102,241,.15);color:#a5b4fc}
.bfreq.declencheur{background:rgba(240,160,48,.15);color:var(--amb)}
.bfreq.demande{background:rgba(196,129,58,.15);color:var(--carl)}
.ch-trig{padding:7px 16px;font-size:11px;color:var(--mut);border-bottom:1px solid var(--borl);background:rgba(0,0,0,.08)}
.ch-trig strong{color:var(--amb)}
.ch-steps{padding:14px 16px;display:flex;flex-direction:column;gap:0}
.ch-step{display:flex;gap:11px;position:relative}
.ch-step:not(:last-child)::before{content:'';position:absolute;left:13px;top:28px;bottom:-8px;width:2px;background:var(--bor)}
.sn{width:26px;height:26px;border-radius:50%;background:var(--bd);border:1px solid;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:10px;flex-shrink:0;margin-top:4px}
.sb2{flex:1;padding-bottom:14px}
.sl{font-size:12px;font-weight:600;color:var(--cr);margin-bottom:3px}
.sd{font-family:'DM Mono',monospace;font-size:10px;color:var(--mut);line-height:1.6}
.ch-out{padding:9px 16px;border-top:1px solid var(--borl);display:flex;align-items:center;gap:7px;font-size:11px;color:var(--crd);background:rgba(0,0,0,.1)}
.ch-out span{color:var(--carl);font-weight:600}
.ch-empty{padding:28px;text-align:center;color:var(--mut);font-size:13px}

/* Evolution */
.evo-tl{display:flex;flex-direction:column;gap:0}
.evo-item{display:flex;gap:14px;position:relative}
.evo-item:not(:last-child)::before{content:'';position:absolute;left:13px;top:34px;bottom:0;width:2px;background:var(--borl)}
.evo-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:5px;border:2px solid}
.evo-dot.nouveau{background:rgba(139,92,246,.15);border-color:rgba(139,92,246,.4)}
.evo-dot.amelioration{background:rgba(196,129,58,.15);border-color:rgba(196,129,58,.4)}
.evo-dot.correction{background:rgba(220,38,38,.1);border-color:rgba(220,38,38,.3)}
.evo-dot.outil_ajoute{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3)}
.evo-dot.workflow_ajoute{background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.4)}
.evo-body{flex:1;padding-bottom:18px}
.evo-hdr{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap}
.evo-date,.evo-ses{font-family:'DM Mono',monospace;font-size:10px;color:var(--mut)}
.bevo{font-family:'DM Mono',monospace;font-size:9px;padding:2px 5px;border-radius:3px;text-transform:uppercase}
.bevo.nouveau{background:rgba(139,92,246,.15);color:#c4b5fd}
.bevo.amelioration{background:rgba(196,129,58,.15);color:var(--carl)}
.bevo.correction{background:rgba(220,38,38,.1);color:#fca5a5}
.bevo.outil_ajoute{background:rgba(16,185,129,.1);color:#6ee7b7}
.bevo.workflow_ajoute{background:rgba(99,102,241,.15);color:#a5b4fc}
.evo-tit{font-size:13px;font-weight:600;color:var(--cr);margin-bottom:5px}
.evo-desc{font-size:12px;color:var(--crd);margin-bottom:8px;line-height:1.6}
.evo-pts{display:flex;flex-direction:column;gap:3px}
.evo-pt{display:flex;align-items:flex-start;gap:7px;font-size:11px;color:var(--crd)}
.evo-pt::before{content:'→';color:var(--car);flex-shrink:0;margin-top:1px}
.evo-empty{text-align:center;padding:36px 20px;color:var(--mut);font-size:13px}

/* Buttons */
.btn{padding:7px 14px;border-radius:var(--rs);font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .12s}
.btn-p{background:var(--car);color:#06101f}
.btn-p:hover{background:var(--carl)}
.btn-s{background:rgba(255,255,255,.06);color:var(--crd);border:1px solid var(--bor)}
.btn-s:hover{background:rgba(255,255,255,.1)}
.btn-sm{padding:4px 10px;font-size:11px}

/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.mo.open{display:flex}
.modal{background:var(--bd);border:1px solid var(--bor);border-radius:var(--r);width:540px;max-width:95vw;max-height:90vh;overflow-y:auto}
.m-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--bor)}
.m-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--cr)}
.m-cls{width:26px;height:26px;border-radius:6px;background:rgba(255,255,255,.06);border:none;color:var(--crd);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.m-cls:hover{background:rgba(255,255,255,.12)}
.m-body{padding:20px;display:flex;flex-direction:column;gap:14px}
.fg{display:flex;flex-direction:column;gap:5px}
.fl{font-size:11px;font-weight:600;color:var(--crd)}
.fi,.fsel,.fta{background:var(--bm);border:1px solid var(--bor);border-radius:var(--rs);color:var(--cr);font-family:'Inter',sans-serif;font-size:12px;padding:8px 11px;outline:none;width:100%}
.fi:focus,.fsel:focus,.fta:focus{border-color:var(--car)}
.fta{resize:vertical;min-height:72px}
.fsel option{background:var(--bm)}
.imp-list{display:flex;flex-direction:column;gap:5px}
.imp-row{display:flex;gap:7px}
.imp-row .fi{flex:1}
.btn-rm{background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.2);color:#fca5a5;border-radius:6px;padding:0 9px;cursor:pointer;font-size:13px}
.btn-rm:hover{background:rgba(220,38,38,.2)}
.btn-ai{background:rgba(196,129,58,.08);border:1px dashed var(--bor);color:var(--car);border-radius:6px;padding:6px 11px;cursor:pointer;font-size:11px;text-align:left;width:100%}
.btn-ai:hover{background:rgba(196,129,58,.15)}
.m-ftr{padding:14px 20px;border-top:1px solid var(--bor);display:flex;justify-content:flex-end;gap:9px}

/* Prompts opérateurs */
.pr-cats{display:flex;flex-direction:column;gap:22px}
.pr-cat-lbl{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;color:var(--car);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.pr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.pr-card{background:var(--bm);border:1px solid var(--bor);border-radius:var(--r);display:flex;flex-direction:column}
.pr-card-hd{padding:9px 12px;border-bottom:1px solid var(--borl)}
.pr-card-tit{font-size:12px;font-weight:600;color:var(--cr)}
.pr-card-body{padding:12px;font-size:11px;color:var(--crd);line-height:1.65;flex:1;white-space:pre-wrap}
.pr-card-ft{padding:7px 10px;border-top:1px solid var(--borl);display:flex;justify-content:flex-end;gap:6px}
.btn-cpy{background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.2);color:var(--car);border-radius:5px;padding:3px 9px;cursor:pointer;font-size:10px;font-family:'Inter',sans-serif;font-weight:600;transition:all .12s}
.btn-cpy:hover{background:rgba(0,212,255,.15)}
.pr-empty{text-align:center;padding:36px 20px;color:var(--mut);font-size:13px}
</style>
</head>
<body>
<div class="app">

<!-- Topbar -->
<header class="topbar">
  <div class="topbar-title">🤖 Profils Agents IA <span>— HCS ERP</span></div>
  <div class="topbar-right">
    <span class="topbar-date" id="hdr-date"></span>
    <button class="btn btn-p btn-sm" onclick="openModal()">+ Enregistrer une évolution</button>
  </div>
</header>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sb-search"><input id="sb-inp" type="text" placeholder="Rechercher un agent…" oninput="filterAgents(this.value)"></div>
  <div class="sb-list" id="sb-list"></div>
</aside>

<!-- Main -->
<main class="main" id="main"></main>

</div>

<!-- Modal -->
<div class="mo" id="mo" onclick="moOut(event)">
  <div class="modal">
    <div class="m-hdr">
      <span class="m-title">📝 Enregistrer une évolution</span>
      <button class="m-cls" onclick="closeMo()">✕</button>
    </div>
    <div class="m-body">
      <div class="fg"><label class="fl">Agent</label><select class="fsel" id="m-ag"></select></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:11px">
        <div class="fg"><label class="fl">Date</label><input type="date" class="fi" id="m-date"></div>
        <div class="fg"><label class="fl">Catégorie</label>
          <select class="fsel" id="m-cat">
            <option value="nouveau">🆕 Nouveau</option>
            <option value="amelioration">⬆️ Amélioration</option>
            <option value="outil_ajoute">🔧 Outil ajouté</option>
            <option value="workflow_ajoute">⛓ Workflow ajouté</option>
            <option value="correction">🔴 Correction</option>
          </select>
        </div>
      </div>
      <div class="fg"><label class="fl">Session</label><input type="text" class="fi" id="m-ses" placeholder="ex: Session mai 2026"></div>
      <div class="fg"><label class="fl">Titre</label><input type="text" class="fi" id="m-tit" placeholder="Résumé en une ligne…"></div>
      <div class="fg"><label class="fl">Description</label><textarea class="fta" id="m-desc" placeholder="Ce qui a été amélioré ou ajouté…"></textarea></div>
      <div class="fg">
        <label class="fl">Points clés</label>
        <div class="imp-list" id="imp-list"></div>
        <button class="btn-ai" onclick="addImp()">+ Ajouter un point</button>
      </div>
    </div>
    <div class="m-ftr">
      <button class="btn btn-s" onclick="closeMo()">Annuler</button>
      <button class="btn btn-p" onclick="saveEvo()">Enregistrer</button>
    </div>
  </div>
</div>

<script>
'use strict';
const SK = 'hcs_agents_evolution_v1';

const AGENTS = [
  { id:'agent_hcs_triage_1', num:1, nom:'Agent 1 — Triage', role:'Réception & Classification',
    icon:'📨', color:'#10B981', tier:'sonnet', type:'n8n', statut:'actif',
    desc:'Premier filtre de tous les messages entrants (Gmail, Messenger). Catégorise et route vers le bon agent sans jamais répondre au client directement.',
    caps:['Classifier messages entrants (Gmail, Messenger) en 5 catégories','Router vers le bon agent avec confidence score','Détecter urgences et cas ambigus (<70% → needs_human_triage)','Extraction automatique données : quantité, produit, client, événement','Filtrer spam et hors-périmètre'],
    outils:[], apps:[], ints:[{a:'Agent 2 Commercial',d:'Route demandes DEVIS'},{a:'Agent 3 PicWish',d:'Route MOCKUP et TRAITEMENT_IMAGE'},{a:'Équipe humaine',d:'INFO_SERVICES et ambiguïtés'}], chains:[] },

  { id:'agent_011Ca1i5Lk4BaMSRTMCtdkjk', num:2, nom:'HCS-Commercial', role:'Agent Commercial & Devis',
    icon:'🤝', color:'#4A5FFF', tier:'sonnet', type:'managed', statut:'actif',
    desc:'Qualifie les demandes DEVIS, établit des devis chiffrés en XPF (double TVA 13%/16%), gère le pipeline commercial et les relances.',
    caps:['Qualification en 7 infos (quantité, textile, couleur, tailles, technique, dimensions, délai)','Devis DEV-2026-XXX avec double TVA polynésienne (13%/16%)','Grille remises : -5% à 50pcs / -10% à 100pcs / -15% à 200+pcs','Suivi pipeline et relances automatiques','Tonalité chaleureux (ia orana, māuruuru) + professionnel'],
    outils:[], apps:[], ints:[{a:'Agent 3 PicWish',d:'Mockup demandé dans devis'},{a:'Agent 5 Planning',d:'Vérif délai <48h avant engagement'},{a:'HCS-Orchestrateur',d:'Devis >500k XPF ou remise >15%'}], chains:[] },

  { id:'agent_hcs_picwish_3', num:3, nom:'Agent 3 — PicWish', role:'Traitement Images',
    icon:'🖼️', color:'#06B6D4', tier:'sonnet', type:'n8n', statut:'actif',
    desc:'Spécialiste traitement images (~15-20/semaine). Détourage fond transparent, upscale résolution, nettoyage artefacts JPEG pour production DTF/vinyle/mockup.',
    caps:['Détourage fond transparent (logos, photos produits)','Upscale résolution (minimum 300 DPI pour impression DTF)','Nettoyage artefacts JPEG, bruit, poussières scans','Analyse qualité avant traitement (DPI, format, usage prévu)','Sauvegarde Dropbox /highcoffeeshirt/[année]/[mois]/[client]/ + ERP assets'],
    outils:[], apps:['🖼️ PicWish Pipeline (apps/picwish-pipeline.html)','🎬 DTF Studio Creator (apps/dtf-studio.html)'],
    ints:[{a:'Agent 2 Commercial',d:'Fichier traité → mockup client'},{a:'Dropbox',d:'/highcoffeeshirt/[année]/[mois]/[client]/'}], chains:[] },

  { id:'agent_011Ca1i2FzUX3zNd4xuM4PHa', num:4, nom:'HCS-Atelier', role:'Responsable Production',

function getPromptCount(id){ return (AGENTS_PROMPTS[id]||[]).length; }

function copyPrByIdx(agId, idx, btn){
  const txt = (AGENTS_PROMPTS[agId]||[])[idx]?.texte||'';
  navigator.clipboard.writeText(txt).then(()=>{
    const orig = btn.textContent;
    btn.textContent = '✓ Copié !';
    btn.style.cssText = 'background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3);color:#6ee7b7';
    setTimeout(()=>{ btn.textContent = orig; btn.removeAttribute('style'); }, 1500);
  });
}

function rdrPromptsHtml(a){
  const proms = AGENTS_PROMPTS[a.id]||[];
  if(!proms.length) return `<div class="pr-empty"><div style="font-size:28px;margin-bottom:10px">📋</div>Aucun prompt défini pour cet agent.<br><span style="font-size:11px;margin-top:6px;display:block">Les prompts seront ajoutés lors des prochaines sessions.</span></div>`;
  const cats = {};
  proms.forEach((p,i)=>{ if(!cats[p.cat]) cats[p.cat]=[]; cats[p.cat].push({...p,_i:i}); });
  return `<div class="pr-cats">${Object.entries(cats).map(([cat,ps])=>`
    <div>
      <div class="pr-cat-lbl">${cat}</div>
      <div class="pr-grid">${ps.map(p=>`
        <div class="pr-card">
          <div class="pr-card-hd"><div class="pr-card-tit">${p.titre}</div></div>
          <div class="pr-card-body">${p.texte.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
          <div class="pr-card-ft">
            <button class="btn-cpy" onclick="copyPrByIdx('${a.id}',${p._i},this)">📋 Copier</button>
          </div>
        </div>`).join('')}
      </div>
    </div>`).join('')}
  </div>`;
}

  document.getElementById('imp-list').innerHTML=_imps.map((v,i)=>`

function saveEvo(){
  const agId=document.getElementById('m-ag').value;
  const e={
    id:'ev_'+Date.now(),
    date:document.getElementById('m-date').value,
    session:document.getElementById('m-ses').value,
    categorie:document.getElementById('m-cat').value,
    titre:document.getElementById('m-tit').value,
    desc:document.getElementById('m-desc').value,
    pts:_imps.filter(p=>p.trim()),
  };
  if(!e.titre.trim()){ alert('Le titre est obligatoire'); return; }
  const d=JSON.parse(localStorage.getItem(SK)||'{}');
  if(!d[agId]) d[agId]=[];
  d[agId].unshift(e);
  localStorage.setItem(SK,JSON.stringify(d));
  closeMo();
  if(agId===cur.id) rdrMain();
  rdrSB();
