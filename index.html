  <!-- Purge automatique des historiques agents corrompus (v2026050103) -->
  <script>
  (function() {
    var HIST_KEY = 'hcs_agents_histories';
    var MEM_VER  = 'hcs_agents_mem_version';
    var CURRENT  = '2026050103';
    if (localStorage.getItem(MEM_VER) !== CURRENT) {
      /* Première exécution avec cette version : nettoyer l'historique */
      try {
        var raw = JSON.parse(localStorage.getItem(HIST_KEY) || '{}');
        var clean = {};
        for (var id in raw) {
          if (Array.isArray(raw[id])) {
            clean[id] = raw[id]
              .filter(function(m) { return typeof m.content === 'string' && m.content.length < 20000; })
              .slice(-20);
          } else { clean[id] = []; }
        }
        localStorage.setItem(HIST_KEY, JSON.stringify(clean));
        localStorage.setItem(MEM_VER, CURRENT);
        console.log('[HCS] Historiques agents purgés (' + CURRENT + ').');
      } catch(e) {
        localStorage.removeItem(HIST_KEY);
        localStorage.setItem(MEM_VER, CURRENT);
      }
    }
  })();
  </script>

  <!-- Thème : appliqué AVANT le rendu pour éviter le flash blanc -->
  <script>
    (function() {
      const saved = localStorage.getItem('hcs_theme');
      /* Respecte aussi la préférence système si aucun choix sauvegardé */
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>

  <script>
    /* ---- Barre de progression synchronisation MySQL ---- */
    window.SyncProgress = {
      show: function(total) {
        var wrap = document.getElementById('sync-progress-wrap');
        var bar  = document.getElementById('sync-progress-bar');
        var lbl  = document.getElementById('sync-progress-label');
        if (wrap) wrap.style.display = 'block';
        if (bar)  bar.style.width = '0%';
        if (lbl)  lbl.textContent = total > 0 ? ('0 / ' + total) : 'Synchronisation…';
      },
      update: function(p) {
        var bar = document.getElementById('sync-progress-bar');
        var lbl = document.getElementById('sync-progress-label');
        var pct = p.total > 0 ? Math.round((p.done / p.total) * 100) : 50;
        if (bar) bar.style.width = pct + '%';
        if (lbl) lbl.textContent = p.total > 0
          ? (p.done + ' / ' + p.total + (p.label ? ' — ' + p.label : ''))
          : 'Synchronisation…';
      },
      hide: function() {
        var bar  = document.getElementById('sync-progress-bar');
        var wrap = document.getElementById('sync-progress-wrap');
        if (bar) bar.style.width = '100%';
        setTimeout(function() {
          if (wrap) wrap.style.display = 'none';
          if (bar)  bar.style.width = '0%';
        }, 900);
      }
    };

    /* ---- Pull MySQL global ---- */
    async function syncFromServer(btn) {
      if (!btn) btn = document.getElementById('btn-mysql-pull');
      const orig = btn ? btn.textContent : '';
      if (btn) { btn.textContent = '⏳'; btn.disabled = true; }

      const COLS = ['produits', 'contacts', 'fournisseurs', 'devis', 'commandes', 'factures'];
      window.SyncProgress.show(COLS.length);

      try {
        const r = await Store.pullAllFromMySQL(undefined, function(p) {
          window.SyncProgress.update(p);
        });
        window.SyncProgress.hide();
        const total = r.updated + r.added;
        let msg, type;
        if (r.errors.length) {
          msg = `Sync partielle : ${total} màj, ${r.errors.length} erreur(s)`;
          type = 'warning';
        } else if (total === 0) {
          msg = 'Déjà à jour — aucune modification détectée';
          type = 'info';
        } else {
          msg = `Sync OK — ${r.updated} mis à jour, ${r.added} ajouté(s)`;
          type = 'success';
        }
        if (typeof Toast !== 'undefined') Toast.show(msg, type);
        else alert(msg);
        /* Rechargement léger si des données ont changé */
        if (total > 0) setTimeout(() => window.location.reload(), 1800);
      } catch(e) {
        window.SyncProgress.hide();
        const err = 'Erreur sync : ' + e.message;
        if (typeof Toast !== 'undefined') Toast.show(err, 'error');
        else alert(err);
      } finally {
        if (btn) { btn.textContent = orig; btn.disabled = false; }
      }
    }

    /* ---- Bouton mode sombre ---- */
    (function() {
      const btn = document.getElementById('btn-theme');
      if (!btn) return;

      function isDark() {
        return document.documentElement.getAttribute('data-theme') === 'dark';
      }

      function applyTheme(dark) {
        if (dark) {
          document.documentElement.setAttribute('data-theme', 'dark');
          btn.textContent = '☀️';
          btn.title = 'Passer en mode clair';
          localStorage.setItem('hcs_theme', 'dark');
        } else {
          document.documentElement.removeAttribute('data-theme');
          btn.textContent = '🌙';
          btn.title = 'Passer en mode sombre';
          localStorage.setItem('hcs_theme', 'light');
        }
      }

      /* Synchronise l'icône au chargement */
      applyTheme(isDark());

      btn.addEventListener('click', () => applyTheme(!isDark()));
    })();

    /* ---- Sidebar toggle ---- */
    (function() {
      const toggle  = document.getElementById('sidebar-toggle');
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebar-overlay');
      if (!toggle || !sidebar || !overlay) return;

      function openSidebar() {
        sidebar.classList.add('sidebar-open');
        overlay.classList.add('visible');
        toggle.textContent = '✕';
      }
      function closeSidebar() {
        sidebar.classList.remove('sidebar-open');
        overlay.classList.remove('visible');
        toggle.textContent = '☰';
      }
      function isSidebarOpen() {
        return sidebar.classList.contains('sidebar-open');
      }

      toggle.addEventListener('click', () => {
        isSidebarOpen() ? closeSidebar() : openSidebar();
      });
      overlay.addEventListener('click', closeSidebar);

      /* Ferme le sidebar quand on clique un item (mobile) */
      sidebar.addEventListener('click', (e) => {
        if (e.target.closest('.sidebar-item') && window.innerWidth < 900) {
          closeSidebar();
        }
      });

      /* Réinitialise si on redimensionne au-dessus du breakpoint */
      window.addEventListener('resize', () => {
        if (window.innerWidth > 900) closeSidebar();
      });
    })();
  </script>
